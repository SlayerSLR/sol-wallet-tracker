<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana Wallet Trade Tracker</title>
<style>
:root {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
  --fg: #e0e0e0; --fg2: #a0a0b0;
  --accent: #00d4aa; --red: #ff4444; --buy: #1a3a2a; --sell: #3a1a1a;
  --border: #2a2a4a; --card: #1e1e36;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--fg); font-family:monospace; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
nav { display:flex; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; }
nav button { background:none; border:none; color:var(--fg2); padding:10px 18px; cursor:pointer; font-family:monospace; font-size:13px; border-bottom:2px solid transparent; transition:all .2s; }
nav button:hover { color:var(--fg); background:var(--bg3); }
nav button.active { color:var(--accent); border-bottom-color:var(--accent); background:var(--bg); }
#content { flex:1; overflow:auto; padding:12px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:12px; }
.stats-row { display:flex; gap:10px; margin-bottom:12px; }
.stat-card { flex:1; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:16px; text-align:center; }
.stat-card .stat-value { font-size:28px; font-weight:bold; color:var(--accent); }
.stat-card .stat-label { font-size:11px; color:var(--fg2); margin-top:4px; }
.charts-row { display:flex; gap:10px; margin-bottom:12px; }
.charts-row .chart-box { flex:1; background:var(--card); border:1px solid var(--border); border-radius:6px; height:220px; }
.tables-row { display:flex; gap:10px; }
.table-box { flex:1; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:10px; }
.table-box .table-title { font-size:12px; color:var(--fg2); margin-bottom:6px; }
.table-box pre { font-size:11px; color:var(--fg); line-height:1.5; max-height:180px; overflow:auto; white-space:pre; }
table { width:100%; border-collapse:collapse; font-size:12px; }
table th { background:var(--bg3); padding:6px 8px; text-align:left; color:var(--fg2); font-weight:normal; position:sticky; top:0; z-index:1; }
table td { padding:5px 8px; border-bottom:1px solid var(--border); }
table tr.buy td { background:var(--buy); } table tr.sell td { background:var(--sell); }
table tr:hover td { filter:brightness(1.3); }
.btn { background:var(--bg3); color:var(--fg); border:1px solid var(--border); padding:6px 14px; border-radius:4px; cursor:pointer; font-family:monospace; font-size:12px; }
.btn:hover { background:var(--accent); color:var(--bg); }
.btn:disabled { opacity:0.4; cursor:default; }
input, select, textarea { background:var(--bg2); color:var(--fg); border:1px solid var(--border); padding:6px 8px; border-radius:4px; font-family:monospace; font-size:12px; }
.progress-bar { background:var(--bg2); border-radius:4px; height:20px; margin:8px 0; overflow:hidden; }
.progress-bar .fill { background:var(--accent); height:100%; transition:width .3s; }
.status-green { color:var(--accent); } .status-red { color:var(--red); }
.log-box { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px; max-height:180px; overflow:auto; font-size:11px; color:var(--fg2); }
#wm-table tbody tr { content-visibility:auto; contain-intrinsic-size:auto 28px; }
</style>
</head>
<body>
<nav id="tab-nav">
  <button data-tab="dashboard" class="active">Dashboard</button>
  <button data-tab="live-feed">Live Feed</button>
  <button data-tab="token-overlap">Token Overlap</button>
  <button data-tab="wallets">Wallets</button>
  <button data-tab="tokens">Tokens</button>
  <button data-tab="analytics">Analytics</button>
  <button data-tab="wallet-manager">Wallet Manager</button>
  <button data-tab="backfill">Backfill</button>
</nav>
<div id="content"></div>
<script src="lib/echarts.min.js"></script>
<script src="lib/table-utils.js"></script>
<script src="lib/echarts-init.js"></script>
<script src="tabs/dashboard.js"></script>
<script src="tabs/live-feed.js"></script>
<script src="tabs/token-overlap.js"></script>
<script src="tabs/wallets.js"></script>
<script src="tabs/tokens.js"></script>
<script src="tabs/analytics.js"></script>
<script src="tabs/wallet-manager.js"></script>
<script src="tabs/backfill.js"></script>
<script src="main.js"></script>
</body>
</html>
